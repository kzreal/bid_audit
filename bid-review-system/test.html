<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>测试页面</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>
<body>
  <div id="app">
    <h1>{{ message }}</h1>
  </div>
  <script>
    const { createApp } = Vue
    createApp({
      setup() {
        return {
          message: 'Vue 3 正常工作！'
        }
      }
    }).mount('#app')
  </script>
</body>
</html>
